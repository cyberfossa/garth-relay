name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual deployment from any branch via GitHub UI

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION || 'europe-west3' }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.GCP_REGION || 'europe-west3' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GCP_APP_NAME || 'garth-relay' }}/${{ vars.GCP_APP_NAME || 'garth-relay' }}:${{ github.sha }}
            ${{ vars.GCP_REGION || 'europe-west3' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GCP_APP_NAME || 'garth-relay' }}/${{ vars.GCP_APP_NAME || 'garth-relay' }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ vars.GCP_APP_NAME || 'garth-relay' }} \
            --image=${{ vars.GCP_REGION || 'europe-west3' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GCP_APP_NAME || 'garth-relay' }}/${{ vars.GCP_APP_NAME || 'garth-relay' }}:${{ github.sha }} \
            --region=${{ vars.GCP_REGION || 'europe-west3' }} \
            --quiet

      - name: Cleanup old Cloud Run revisions
        run: |
          # Keep the 5 most recent revisions, delete the rest
          REVISIONS=$(gcloud run revisions list \
            --service=${{ vars.GCP_APP_NAME || 'garth-relay' }} \
            --region=${{ vars.GCP_REGION || 'europe-west3' }} \
            --sort-by="~creationTimestamp" \
            --format="value(name)" | tail -n +6)

          for REV in $REVISIONS; do
            echo "Deleting old revision: $REV"
            gcloud run revisions delete "$REV" \
              --region=${{ vars.GCP_REGION || 'europe-west3' }} \
              --quiet || true
          done
